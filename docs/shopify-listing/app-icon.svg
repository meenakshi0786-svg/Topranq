<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F6EF7"/>
      <stop offset="1" stop-color="#7C5CFC"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed gradient tile. Shopify rounds the corners automatically. -->
  <rect width="1200" height="1200" fill="url(#g)"/>
  <!-- Brand monogram, centered. -->
  <text x="600" y="610"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="720" font-weight="800" fill="#ffffff"
        text-anchor="middle" dominant-baseline="central">R</text>
</svg>
