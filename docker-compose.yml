services:
  ranqapex:
    build: .
    container_name: ranqapex-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GOOGLE_SEARCH_API_KEY=${GOOGLE_SEARCH_API_KEY}
      - GOOGLE_SEARCH_CX=${GOOGLE_SEARCH_CX}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - AHREFS_API_KEY=${AHREFS_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - FROM_EMAIL=${FROM_EMAIL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - REVIEW_TOKEN_SECRET=${REVIEW_TOKEN_SECRET}
    volumes:
      - ranqapex-data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ranqapex.rule=Host(`explorefeatures.in`) || Host(`www.explorefeatures.in`)"
      - "traefik.http.routers.ranqapex.entrypoints=websecure"
      - "traefik.http.routers.ranqapex.tls.certresolver=letsencrypt"
      - "traefik.http.services.ranqapex.loadbalancer.server.port=3000"

volumes:
  ranqapex-data:
