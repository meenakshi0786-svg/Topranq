# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "d30f51d705f71b344c5ad4c1bec35b4a"
name = "Ranqapex Blog Publisher"
application_url = "https://ranqapex.com/api/shopify/app"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_content,read_content,read_products"

[auth]
redirect_urls = [ "https://ranqapex.com/api/shopify/callback" ]

[webhooks]
api_version = "2025-10"

  # Mandatory GDPR/CCPA compliance webhooks (required for App Store approval).
  # Handlers live in src/app/api/shopify/webhooks/* and verify the HMAC signature.
  [webhooks.privacy_compliance]
  customer_data_request_url = "https://ranqapex.com/api/shopify/webhooks/customers-data-request"
  customer_deletion_url = "https://ranqapex.com/api/shopify/webhooks/customers-redact"
  shop_deletion_url = "https://ranqapex.com/api/shopify/webhooks/shop-redact"

  # Clean up the stored access token when a merchant uninstalls.
  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "https://ranqapex.com/api/shopify/webhooks/uninstall"

[build]
automatically_update_urls_on_dev = false
